defaults:
  - _self_
  - env: metadrive          # <--- 修改 1: 改为 metadrive
  - encoder: dino
  - action_encoder: proprio
  - proprio_encoder: proprio
  - decoder: vqvae
  - predictor: vit
  # - override hydra/launcher: submitit_slurm  <--- 修改 2: 注释掉或删除这行!

# Checkpoints 保存路径
ckpt_base_path: /home/lcj/dino_wm/checkpoints/outputs0125

# <--- 修改 3: 移除整个 hydra: launcher 部分，改用默认本地运行 --->
hydra:
  run:
    dir: ${ckpt_base_path}/outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}

training:
  seed: 0
  epochs: 100
  batch_size: 8       # <--- 修改 4: 5070Ti 显存16G，建议先设 16 或 32
  save_every_x_epoch: 5
  reconstruct_every_x_batch: 100
  num_reconstruct_samples: 4
  encoder_lr: 1e-6
  decoder_lr: 3e-4
  predictor_lr: 5e-4
  action_encoder_lr: 5e-4

img_size: 224
frameskip: 5           # <--- 保持 5，让模型学习 0.5秒后的变化
concat_dim: 1
normalize_action: True

# Action Encoder Config
action_emb_dim: 256    # 增大一点 embedding 维度
num_action_repeat: 1

# Proprio Encoder Config
proprio_emb_dim: 256
num_proprio_repeat: 1

num_hist: 3            # 历史看 3 帧
num_pred: 1            # 预测未来 1 帧
has_predictor: True
has_decoder: True

model:
  _target_: models.visual_world_model.VWorldModel
  image_size: ${img_size}
  num_hist: ${num_hist}
  num_pred: ${num_pred}
  train_encoder: False    # DINO 冻结
  train_predictor: True   # 训练世界模型
  train_decoder: True     # 训练解码器(用于看图)

debug: False

# 暂时关闭 Planning Eval，先跑通训练
plan_settings:
  plan_cfg_path: null